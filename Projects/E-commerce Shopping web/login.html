<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Inam Ecommerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="login-section" class="form-section">
        <h2>Login</h2>
        <form id="loginForm">
            <label for="loginEmail">Email:</label>
            <input type="email" id="loginEmail" required>
            <label for="loginPassword">Password:</label>
            <input type="password" id="loginPassword" required>
            <button type="submit" class="nav-btn">Login</button>
        </form>
        <p id="loginMsg"></p>
        <p>Don't have an account? <a href="signup.html">Signup</a></p>
    </section>
    <script>
    document.getElementById('loginForm').onsubmit = function(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const storedPassword = localStorage.getItem(email);
        if (storedPassword && storedPassword === password) {
            document.getElementById('loginMsg').textContent = "Login successful!";
            document.getElementById('loginMsg').style.color = "green";
            setTimeout(function() {
                window.location.href = "shop.html";
            }, 1000); 
        } else {
            document.getElementById('loginMsg').textContent = "Invalid email or password!";
            document.getElementById('loginMsg').style.color = "red";
        }
    };
    </script>
</body>
</html>
