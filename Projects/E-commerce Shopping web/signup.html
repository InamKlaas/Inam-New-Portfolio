<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup - Inam Ecommerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="signup-section" class="form-section">
        <h2>Signup</h2>
        <form id="signupForm">
            <label for="signupEmail">Email:</label>
            <input type="email" id="signupEmail" required>
            <label for="signupPassword">Password:</label>
            <input type="password" id="signupPassword" required>
            <button type="submit" class="nav-btn">Signup</button>
        </form>
        <p id="signupMsg"></p>
        <p>Already have an account? <a href="login.html">Login</a></p>
        <script>
        document.getElementById('signupForm').onsubmit = function(e) {
            e.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            if (localStorage.getItem(email)) {
                document.getElementById('signupMsg').textContent = "User already exists!";
                document.getElementById('signupMsg').style.color = "red";
            } else {
                localStorage.setItem(email, password);
                document.getElementById('signupMsg').textContent = "Signup successful! You can now login.";
                document.getElementById('signupMsg').style.color = "green";
                document.getElementById('signupForm').reset();
            }
        };
        </script>
    </section>
</body>
</html>
